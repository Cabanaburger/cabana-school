<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trilha concluída · Cabana School</title>
<style>
  :root{
    --green:#4F9C40; --green-dark:#386F2D; --green-deep:#2A5322;
    --cream:#FBF3D9; --paper:#FFFDF7; --ink:#1E1A14; --ink-soft:#574E3F;
    --bacon:#D9754C; --fries:#D89840; --milkshake:#D6699E;
    --display:'Cooper Fallback', Georgia, serif;
    --body:'Avenir Next','Century Gothic',-apple-system,sans-serif;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; min-height:100vh; font-family:var(--body); color:var(--ink);
    background: var(--cream);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:44px 16px;
  }
  .top-copy{ text-align:center; margin-bottom:24px; max-width:340px; }
  .top-copy .kicker{ font-size:12px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--green-dark); margin-bottom:8px; }
  .top-copy h1{ font-family:var(--display); font-weight:400; font-size:22px; margin:0; color:var(--ink); }

  .card-wrap{ position:relative; width:300px; }
  .card{
    width:100%; aspect-ratio:9/16; border-radius:28px; overflow:hidden; position:relative;
    background: var(--paper);
    box-shadow:0 45px 90px -18px rgba(30,26,20,0.35);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:30px 26px;
  }
  .dot{ position:absolute; border-radius:50%; opacity:.5; }

  .medal-wrap{ position:relative; width:190px; height:190px; display:flex; align-items:center; justify-content:center; }
  .medal-ring{
    position:absolute; inset:0; border-radius:50%;
    background: conic-gradient(from -40deg, var(--green), var(--fries), var(--milkshake), var(--green));
    padding:6px;
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 6px), #000 calc(100% - 6px));
            mask: radial-gradient(farthest-side, transparent calc(100% - 6px), #000 calc(100% - 6px));
  }
  .medal-inner{
    position:absolute; inset:10px; border-radius:50%; background:var(--paper);
    box-shadow: inset 0 4px 14px rgba(30,26,20,0.12);
    display:flex; align-items:center; justify-content:center;
  }
  .medal-mascote{ width:118px; position:relative; z-index:3; transform:translateY(6px); filter:drop-shadow(0 10px 14px rgba(0,0,0,0.18)); }

  .selo-kicker{ margin-top:22px; font-size:11px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--green-dark); }
  .selo-titulo{ font-family:var(--display); font-weight:400; font-size:25px; margin:6px 0 4px; text-align:center; color:var(--ink); }
  .selo-texto{ font-size:12.5px; color:var(--ink-soft); text-align:center; max-width:220px; line-height:1.5; margin:0; }

  .selo-stat{
    margin-top:16px; display:inline-flex; align-items:center; gap:6px; background:var(--cream);
    border:1px solid rgba(30,26,20,0.1); padding:8px 16px; border-radius:100px; font-size:12px; font-weight:700; color:var(--green-dark);
  }

  .actions{ display:flex; gap:12px; margin-top:26px; flex-wrap:wrap; justify-content:center; }
  .actions button{
    font-family:inherit; border:none; cursor:pointer; font-weight:700; font-size:13.5px;
    padding:13px 22px; border-radius:100px; display:flex; align-items:center; gap:8px;
  }
  .btn-download{ background:var(--green-dark); color:#fff; }
  .btn-share{ background:var(--paper); color:var(--ink); border:1px solid rgba(30,26,20,0.2) !important; }
  .continue-link{ margin-top:22px; font-size:13px; font-weight:600; color:var(--ink-soft); text-decoration:underline; cursor:pointer; }
</style>
</head>
